<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>大阪 8 天 7 夜旅遊 App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-label="大阪旅行總覽">
        <img src="assets/osaka-hero.png" alt="大阪夜景與運河燈光" class="hero__image" />
        <div class="hero__overlay"></div>
        <div class="hero__content">
          <p class="eyebrow">Japan Trip Planner</p>
          <h1>大阪 8 天 7 夜</h1>
          <p class="hero__copy">從梅田、難波、環球影城到京都與奈良一日遊，把行程、預算、交通和打包清單收在同一個地方。</p>
          <div class="hero__stats" aria-label="旅行重點">
            <span><strong>8</strong> 天</span>
            <span><strong>7</strong> 夜</span>
            <span><strong>6</strong> 區域</span>
            <span><strong>1</strong> 個 App</span>
          </div>
        </div>
      </section>

      <section class="toolbar" aria-label="行程控制">
        <div class="field">
          <label for="pace">旅行步調</label>
          <select id="pace">
            <option value="balanced">剛剛好</option>
            <option value="relaxed">慢慢玩</option>
            <option value="packed">排滿一點</option>
          </select>
        </div>
        <div class="field">
          <label for="areaFilter">區域</label>
          <select id="areaFilter">
            <option value="all">全部區域</option>
            <option value="osaka">大阪市區</option>
            <option value="usj">環球影城</option>
            <option value="kyoto">京都</option>
            <option value="nara">奈良</option>
            <option value="kobe">神戶</option>
          </select>
        </div>
        <div class="field field--inline">
          <label for="yenRate">日圓匯率</label>
          <input id="yenRate" type="number" min="0.1" max="1" step="0.001" value="0.22" />
        </div>
      </section>

      <section class="dashboard" aria-label="旅遊摘要">
        <article class="summary-panel">
          <h2>今日摘要</h2>
          <div class="summary-grid">
            <div>
              <span class="metric" id="visibleDays">8</span>
              <span class="metric-label">符合條件天數</span>
            </div>
            <div>
              <span class="metric" id="totalYen">¥0</span>
              <span class="metric-label">預估花費</span>
            </div>
            <div>
              <span class="metric" id="totalTwd">NT$0</span>
              <span class="metric-label">換算台幣</span>
            </div>
          </div>
        </article>

        <article class="summary-panel">
          <h2>票券建議</h2>
          <div class="pass-list" id="passList"></div>
        </article>
      </section>

      <section class="content-grid">
        <section class="itinerary" aria-label="每日行程">
          <div class="section-heading">
            <h2>每日行程</h2>
            <p id="paceHint">景點密度適中，保留吃飯、移動和臨時逛街時間。</p>
          </div>
          <div class="day-list" id="dayList"></div>
        </section>

        <aside class="side-panel" aria-label="旅行工具">
          <section class="tool-panel">
            <h2>打包清單</h2>
            <div class="checklist" id="checklist"></div>
          </section>
          <section class="tool-panel">
            <h2>小提醒</h2>
            <ul class="tips">
              <li>住宿建議選難波、心齋橋或梅田，晚上回飯店比較省力。</li>
              <li>京都與奈良日請提早出門，熱門景點上午人潮較舒服。</li>
              <li>環球影城日不要再排大型夜間行程，留體力給排隊與表演。</li>
              <li>餐廳收藏以「必吃 3 間、備案 6 間」最實用。</li>
            </ul>
          </section>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
